<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#dff3ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="My English">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="icon" href="./icon-192.png">
  <link rel="stylesheet" href="./styles.css">
  <title>My English</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>𓊆ྀི My English 𓊇ྀི</h1>
      <nav class="tabs" aria-label="主要功能">
        <button class="tab active" data-view="learn">學習</button>
        <button class="tab" data-view="library">我的收藏</button>
        <button class="tab" data-view="trash">垃圾桶</button>
        <button class="tab" data-view="settings">設定</button>
      </nav>
    </header>

    <section id="learnView" class="view active">
      <div class="panel">
        <div class="input-block">
          <textarea id="inputText" placeholder="請輸入英文單字或句子"></textarea>
          <div id="inlineTranslation" class="inline-translation hidden"></div>
        </div>
        <div class="controls">
          <button id="analyzeBtn" class="primary">分析</button>
          <button id="playSentenceBtn">播放整句</button>
          <button id="clearBtn">清除輸入</button>
          <button id="saveBtn" class="primary hidden">收藏到我的英文知識庫</button>
        </div>
        <div class="controls speech-rate-control">
          <select id="speedSelect" aria-label="播放速度"><option value="0.5">0.5×</option><option value="0.7">0.7×</option><option value="1" selected>1×（正常）</option></select>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="result" class="result hidden"><div id="analysisGrid" class="analysis-grid"></div></div>
      </div>
    </section>

    <section id="libraryView" class="view">
      <div class="panel">
        <div class="section-head">
          <div><h2>我的收藏</h2><div id="libraryStats" class="library-stats"></div></div>
          <input id="searchInput" type="search" placeholder="搜尋英文或中文">
        </div>
        <div id="libraryMessage" class="status" role="status" aria-live="polite"></div>
        <div id="libraryList" class="card-list"></div>
      </div>
    </section>

    <section id="settingsView" class="view">
      <div class="panel settings-sections">
        <section><h2>發音</h2><div class="controls">
          <select id="voiceSelect" aria-label="美式英文聲音"><option value="">載入聲音中</option></select>
          <button id="previewVoiceBtn">試聽</button>
        </div></section>
        <section><h2>同步</h2><div id="syncStatus" class="status">同步尚未設定</div><div class="controls"><button id="enableSyncBtn">開啟同步</button><button id="syncNowBtn">立即同步</button><button id="pauseSyncBtn">暫停同步</button><button id="disableSyncBtn">關閉同步</button></div></section>
        <section><h2>備份與復原</h2><div class="data-tools"><button id="exportBtn">匯出 JSON</button><button id="importBtn">匯入 JSON</button><input id="importFile" class="visually-hidden" type="file" accept="application/json,.json"></div><div id="settingsMessage" class="status" role="status"></div></section>
      </div>
    </section>

    <section id="trashView" class="view">
      <div class="panel">
        <div class="section-head"><h2>垃圾桶</h2><span class="muted">可復原，永久刪除後無法取回。</span></div>
        <div id="trashList" class="card-list"></div>
      </div>
    </section>
  </main>
  <script type="module" src="./app.js?v=2-minimal-16"></script>
</body>
</html>
